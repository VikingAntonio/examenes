<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exámenes Disponibles - VikingDev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300">
    <!-- Navbar -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-primary">VikingDev<span class="text-gray-500 dark:text-gray-400">Exámenes</span></span>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="adminExamen.html" class="text-gray-600 dark:text-gray-300 hover:text-primary transition-colors">Administrar</a>
                    <button id="themeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:block"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Filters -->
        <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm mb-8 flex flex-wrap gap-4 items-center animate-fade-in">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Filtrar por Materia</label>
                <select id="subjectFilter" class="w-full bg-gray-50 dark:bg-gray-700 border-none rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary outline-none">
                    <option value="all">Todas las materias</option>
                </select>
            </div>
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Filtrar por Nivel</label>
                <select id="levelFilter" class="w-full bg-gray-50 dark:bg-gray-700 border-none rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary outline-none">
                    <option value="all">Todos los niveles</option>
                </select>
            </div>
            <div class="flex items-end">
                <button id="resetFilters" class="text-sm text-primary hover:underline">Limpiar Filtros</button>
            </div>
        </div>

        <!-- Exam Grid -->
        <div id="examGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Loading State -->
            <div class="col-span-full flex justify-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/exams.js"></script>
    <script>
        // Theme Logic
        const themeToggle = document.getElementById('themeToggle');

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });
    </script>
</body>
</html>
